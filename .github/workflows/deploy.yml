name: Deploy

on:
  push:
    branches: [main]

# Minimal permissions — OIDC token write is the only addition needed
permissions:
  id-token: write  # Required for OIDC authentication with AWS
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.5.0
        with:
          name: dist
          path: dist/
          retention-days: 1

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production  # Enables environment protection rules + secrets

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444306b7f00b13eebbef14de # v4.1.8
        with:
          name: dist
          path: dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      # Sync with per-type cache headers:
      #   index.html          → no-cache (always revalidate so users get latest deploy)
      #   assets/* (hashed)   → 1 year   (content-addressed, safe to cache forever)
      #   puzzles/*.json      → 1 hour   (game data, short TTL)
      - name: Sync index.html (no-cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html" \
            --quiet

      - name: Sync hashed assets (1-year cache)
        run: |
          aws s3 sync dist/assets/ s3://${{ secrets.S3_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete \
            --quiet

      - name: Sync puzzle data (1-hour cache)
        run: |
          aws s3 sync dist/puzzles/ s3://${{ secrets.S3_BUCKET }}/puzzles/ \
            --cache-control "public, max-age=3600" \
            --delete \
            --quiet

      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} \
            --paths "/index.html" "/puzzles/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation created: $INVALIDATION_ID"
